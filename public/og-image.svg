<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1f6fff"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="32" fill="#111827" stroke="#334155" stroke-width="4"/>
  <text x="110" y="220" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700">Big Screen Timer</text>
  <text x="110" y="300" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34">Free online timer and stopwatch for classrooms, focus work, workouts, and meetings.</text>
  <text x="110" y="440" fill="url(#accent)" font-family="Inter, Arial, sans-serif" font-size="132" font-weight="700">25:00</text>
  <text x="110" y="515" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="28">Full-screen. Simple. Fast.</text>
</svg>
